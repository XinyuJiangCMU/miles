name: Docker Build & Push (AMD ROCm 7.2)

on:
  push:
    branches:
      - main
    paths:
      - 'docker/Dockerfile.rocm'
      - 'docker/amd_patch/**'

  schedule:
    - cron: '0 7 * * *'

  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag mode: dev (rolling + timestamped) or custom'
        required: true
        type: choice
        options:
          - dev
          - custom
        default: dev
      custom_tag:
        description: 'Custom tag name (only used when image_tag is custom)'
        required: false
        default: ''
        type: string

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          IMAGE=rlsys/miles
          POSTFIX=-rocm720-mi35x
          DEV_TAG="${IMAGE}:dev${POSTFIX}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ inputs.image_tag }}" = "custom" ] && [ -n "${{ inputs.custom_tag }}" ]; then
            echo "tag_args=-t ${IMAGE}:${{ inputs.custom_tag }}${POSTFIX}" >> "$GITHUB_OUTPUT"
          else
            TS=$(date -u +%Y%m%d%H%M)
            echo "tag_args=-t ${DEV_TAG} -t ${DEV_TAG}-${TS}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        run: |
          docker buildx build . \
            -f docker/Dockerfile.rocm \
            --build-arg GPU_ARCH=gfx950 \
            --build-arg SGLANG_IMAGE_TAG=v0.5.10-rocm720-mi35x \
            --build-arg HTTP_PROXY="${http_proxy:-}" \
            --build-arg HTTPS_PROXY="${https_proxy:-}" \
            --build-arg NO_PROXY="localhost,127.0.0.1" \
            ${{ steps.meta.outputs.tag_args }} \
            --push

      - name: Prune old dev tags
        if: github.event_name == 'schedule'
        run: |
          KEEP=20
          IMAGE=rlsys/miles

          TOKEN=$(curl -s -X POST "https://hub.docker.com/v2/users/login/" \
            -H "Content-Type: application/json" \
            -d '{"username":"${{ secrets.DOCKERHUB_USERNAME }}","password":"${{ secrets.DOCKERHUB_TOKEN }}"}' \
            | jq -r .token)

          DEV_TAGS=""
          URL="https://hub.docker.com/v2/repositories/${IMAGE}/tags/?page_size=100"
          while [ "$URL" != "null" ] && [ -n "$URL" ]; do
            RESP=$(curl -s -H "Authorization: JWT ${TOKEN}" "$URL")
            PAGE_TAGS=$(echo "$RESP" | jq -r '.results[].name' | grep -E '^dev-rocm720-mi35x-[0-9]{12}$' || true)
            DEV_TAGS="${DEV_TAGS}${PAGE_TAGS}"$'\n'
            URL=$(echo "$RESP" | jq -r '.next')
          done

          SORTED=$(echo "$DEV_TAGS" | grep -v '^$' | sort)
          COUNT=$(echo "$SORTED" | wc -l | tr -d ' ')
          echo "Found ${COUNT} timestamped dev tags"

          if [ "$COUNT" -le "$KEEP" ]; then
            echo "Nothing to prune (keep=${KEEP})"
            exit 0
          fi

          DELETE_COUNT=$((COUNT - KEEP))
          TO_DELETE=$(echo "$SORTED" | head -n "$DELETE_COUNT")
          echo "Pruning ${DELETE_COUNT} old dev tags..."

          echo "$TO_DELETE" | while read -r TAG; do
            [ -z "$TAG" ] && continue
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Authorization: JWT ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${TAG}/")
            if [ "$HTTP_CODE" = "204" ]; then
              echo "  Deleted ${TAG}"
            else
              echo "  Failed to delete ${TAG} (HTTP ${HTTP_CODE})"
            fi
          done
